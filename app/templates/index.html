<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制台 - Kyma Proxy</title>
    <style>
        :root { --bg: #0b1220; --panel: rgba(15, 23, 42, 0.88); --accent: #3b82f6; --text: #e5eefc; --term-bg: #000; --term-text: #00ff00; }
        body { margin: 0; padding: 20px; background: var(--bg); color: var(--text); font-family: system-ui; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        /* 左侧配置面板 */
        .config-panel { width: 350px; background: var(--panel); border-radius: 16px; padding: 20px; border: 1px solid #334155; display: flex; flex-direction: column; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-family: monospace; background: #1e293b; padding: 10px; border-radius: 8px; font-size: 14px; word-break: break-all; }
        .deploy-btn { margin-top: auto; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .deploy-btn:hover { background: #2563eb; }
        .deploy-btn:disabled { background: #475569; cursor: not-allowed; }

        /* 右侧终端模拟器 */
        .terminal-panel { flex: 1; background: var(--term-bg); border-radius: 16px; padding: 20px; border: 1px solid #334155; overflow-y: auto; font-family: 'Courier New', Courier, monospace; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .log-line { margin: 5px 0; font-size: 14px; line-height: 1.4; color: var(--term-text); }
        .log-time { color: #888; margin-right: 10px; }
        .blinking-cursor { display: inline-block; width: 8px; height: 15px; background-color: var(--term-text); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 5px;}
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚀 Serverless Kyma 控制台</h2>
        <div style="font-size: 14px; color: #94a3b8;">Status: <span style="color: #22c55e;">● 在线</span></div>
    </div>

    <div class="main-container">
        <div class="config-panel">
            <h3 style="margin-top: 0;">⚙️ 系统环境变量</h3>
            <div class="info-group">
                <div class="info-label">SAP 登录账号</div>
                <div class="info-value">{{ config.sap_user }}</div>
            </div>
            <div class="info-group">
                <div class="info-label">Argo 隧道域名</div>
                <div class="info-value">{{ config.argo_domain }}</div>
            </div>
            <div class="info-group">
                <div class="info-label">订阅路径 Token</div>
                <div class="info-value">/{{ config.sub_token }}/</div>
            </div>
            <div style="font-size: 12px; color: #ef4444; margin-bottom: 20px; line-height: 1.5;">
                ⚠️ 提示：所有配置均由 Docker 环境变量注入，修改配置请重启容器并更新环境变量。
            </div>
            <button id="deployBtn" class="deploy-btn" onclick="startDeployment()">⚡ 开始自动部署流水线</button>
        </div>

        <div class="terminal-panel" id="terminal">
            <div class="log-line"><span class="log-time">[System]</span>欢迎使用全自动代理部署流水线。等待指令输入...</div>
            <div id="cursor" class="blinking-cursor"></div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const cursor = document.getElementById('cursor');
        const deployBtn = document.getElementById('deployBtn');

        // 初始化 WebSocket 连接
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws/logs`);

        ws.onmessage = function(event) {
            appendLog(event.data);
        };

        ws.onclose = function() {
            appendLog("⚠️ 与控制台断开连接，请刷新页面重试。", "red");
        };

        function appendLog(message, color = "") {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const line = document.createElement('div');
            line.className = 'log-line';
            if (color) line.style.color = color;
            line.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            
            terminal.insertBefore(line, cursor);
            terminal.scrollTop = terminal.scrollHeight; // 自动滚到底部
        }

        async function startDeployment() {
            if (!confirm("即将启动自动化引擎，这可能需要 15-20 分钟。\n在此期间请勿关闭容器。\n确定要继续吗？")) return;
            
            deployBtn.disabled = true;
            deployBtn.innerText = "⏳ 正在部署中...";
            appendLog("====== 启动指令已下发 ======", "#3b82f6");

            try {
                const res = await fetch('/api/deploy', { method: 'POST' });
                if (!res.ok) throw new Error("API 请求失败");
            } catch (err) {
                appendLog("❌ 触发失败: " + err.message, "#ef4444");
                deployBtn.disabled = false;
                deployBtn.innerText = "⚡ 开始自动部署流水线";
            }
        }
    </script>
</body>
</html>
