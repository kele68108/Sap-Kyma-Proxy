<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制台 - Kyma Proxy</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

    <style>
        :root { --bg: #0b1220; --panel: rgba(15, 23, 42, 0.88); --accent: #3b82f6; --text: #e5eefc; --term-bg: #000; --term-text: #00ff00; }
        body { margin: 0; padding: 20px; background: var(--bg); color: var(--text); font-family: system-ui; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        /* 优化后的左侧极简面板 */
        .config-panel { width: 320px; background: var(--panel); border-radius: 16px; padding: 24px; border: 1px solid #334155; display: flex; flex-direction: column; }
        .account-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(148, 163, 184, 0.2); padding: 20px; border-radius: 12px; text-align: center; margin-top: 10px; margin-bottom: 20px;}
        .account-title { font-size: 13px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        .account-email { font-family: monospace; font-size: 16px; color: #60a5fa; font-weight: bold; word-break: break-all;}
        
        /* 部署按钮增强 */
        .deploy-btn { margin-top: auto; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background-color 0.3s, filter 0.2s; }
        .deploy-btn:hover { filter: brightness(1.1); }
        .deploy-btn:disabled { cursor: not-allowed; filter: brightness(0.8); }

        /* 右侧终端模拟器 */
        .terminal-panel { flex: 1; background: var(--term-bg); border-radius: 16px; padding: 20px; border: 1px solid #334155; overflow-y: auto; font-family: 'Courier New', Courier, monospace; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .log-line { margin: 5px 0; font-size: 14px; line-height: 1.4; color: var(--term-text); }
        .log-time { color: #888; margin-right: 10px; }
        .blinking-cursor { display: inline-block; width: 8px; height: 15px; background-color: var(--term-text); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 5px;}
        @keyframes blink { 50% { opacity: 0; } }

        /* 弹窗自定义圆角 */
        .swal-custom-border { border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 20px !important; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin: 0;">🚀 Sap Kyma Proxy 部署控制台</h2>
        <div style="font-size: 14px; color: #94a3b8;">Status: <span style="color: #22c55e; font-weight: bold;">● 在线</span></div>
    </div>

    <div class="main-container">
        <div class="config-panel">
            <h3 style="margin-top: 0; font-size: 18px; margin-bottom: 5px;">⚙️ 当前任务配置</h3>
            
            <div class="account-card">
                <div class="account-title">SAP 目标账户</div>
                <div class="account-email">{{ config.sap_user }}</div>
            </div>
            
            <div style="flex: 1;"></div> <button id="deployBtn" class="deploy-btn" onclick="startDeployment()">⚡ 开始自动部署</button>
        </div>

        <div class="terminal-panel" id="terminal">
            <div class="log-line"><span class="log-time">[System]</span>欢迎使用 Sap Kyma Proxy 全自动部署。等待部署指令...</div>
            <div id="cursor" class="blinking-cursor"></div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const cursor = document.getElementById('cursor');
        const deployBtn = document.getElementById('deployBtn');

        // 初始化 WebSocket 连接
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws/logs`);

        // 监听后端日志并处理按钮状态
        ws.onmessage = function(event) {
            const msg = event.data;
            appendLog(msg);
            
            // 部署成功判定
            if (msg.includes("【全流程结束】") || msg.includes("部署圆满完成")) {
                deployBtn.innerText = "✅ 部署成功";
                deployBtn.style.background = "#22c55e"; // 护眼绿
                deployBtn.disabled = true; 
            } 
            // 部署坠机判定
            else if (msg.includes("❌ 错误详情") || msg.includes("❌ Kubectl 部署失败") || msg.includes("致命错误")) {
                deployBtn.innerText = "❌ 部署坠机 (点击重试)";
                deployBtn.style.background = "#ef4444"; // 警戒红
                deployBtn.disabled = false;
            }
        };

        ws.onclose = function() {
            appendLog("⚠️ 与控制台断开连接，请刷新页面重试。", "red");
        };

        function appendLog(message, color = "") {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const line = document.createElement('div');
            line.className = 'log-line';
            if (color) line.style.color = color;
            line.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            
            terminal.insertBefore(line, cursor);
            terminal.scrollTop = terminal.scrollHeight; // 自动滚到底部
        }

        // 使用美化版居中弹窗触发部署
        function startDeployment() {
            Swal.fire({
                title: '启动部署引擎',
                html: '即将拉起全自动爬虫流水线，这可能需要 <b>15-20 分钟</b>。<br>在此期间请勿关闭或重启容器容器。<br><br>确定要继续吗？',
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: 'rgba(255,255,255,0.1)',
                confirmButtonText: '🚀 确定执行',
                cancelButtonText: '取消',
                background: '#0f172a',
                color: '#e5eefc',
                customClass: {
                    popup: 'swal-custom-border'
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    // 初始化按钮状态
                    deployBtn.disabled = true;
                    deployBtn.style.background = "#3b82f6"; // 恢复默认蓝
                    deployBtn.innerText = "⏳ 正在拉起矩阵...";
                    appendLog(" 已下发部署指令 ", "#3b82f6");

                    try {
                        const res = await fetch('/api/deploy', { method: 'POST' });
                        if (!res.ok) throw new Error("API 请求失败");
                    } catch (err) {
                        appendLog("❌ 触发失败: " + err.message, "#ef4444");
                        deployBtn.disabled = false;
                        deployBtn.style.background = "#ef4444";
                        deployBtn.innerText = "❌ 触发异常 (点击重试)";
                    }
                }
            });
        }
    </script>
</body>
</html>
