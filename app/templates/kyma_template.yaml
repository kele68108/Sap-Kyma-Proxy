# 5️⃣ Web UI + VLESS 直连
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-web-direct
  namespace: my-proxy
spec:
  replicas: 1
  selector: { matchLabels: { app: proxy-web-direct } }
  template:
    metadata:
      labels: { app: proxy-web-direct }
      annotations: 
        sidecar.istio.io/inject: "true"
        traffic.sidecar.istio.io/excludeOutboundIPRanges: "0.0.0.0/0"
    spec:
      serviceAccountName: proxy-sa
      initContainers:
      - name: nlb-injector
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for AWS to provision NLB for Hy2..."
          HY2_TARGET=""
          while [ -z "$HY2_TARGET" ]; do
            HY2_TARGET=$(kubectl get svc hy2-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            [ -z "$HY2_TARGET" ] && HY2_TARGET=$(kubectl get svc hy2-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            [ -z "$HY2_TARGET" ] && sleep 5
          done
          echo "Hy2 NLB Target: $HY2_TARGET"

          echo "Waiting for AWS to provision NLB for TUIC..."
          TUIC_TARGET=""
          while [ -z "$TUIC_TARGET" ]; do
            TUIC_TARGET=$(kubectl get svc tuic-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            [ -z "$TUIC_TARGET" ] && TUIC_TARGET=$(kubectl get svc tuic-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            [ -z "$TUIC_TARGET" ] && sleep 5
          done
          echo "TUIC NLB Target: $TUIC_TARGET"

          echo "Waiting for AWS to provision NLB for Socks5..."
          SOCKS5_TARGET=""
          while [ -z "$SOCKS5_TARGET" ]; do
            SOCKS5_TARGET=$(kubectl get svc socks5-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            [ -z "$SOCKS5_TARGET" ] && SOCKS5_TARGET=$(kubectl get svc socks5-service -n my-proxy -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            [ -z "$SOCKS5_TARGET" ] && sleep 5
          done
          echo "Socks5 NLB Target: $SOCKS5_TARGET"

          echo "Injecting targets into HTML..."
          cp /template/index.html /app/html/index.html
          sed -i "s/__HY2_TARGET__/$HY2_TARGET/g" /app/html/index.html
          sed -i "s/__TUIC_TARGET__/$TUIC_TARGET/g" /app/html/index.html
          sed -i "s/__SOCKS5_TARGET__/$SOCKS5_TARGET/g" /app/html/index.html
          echo "Injection complete! Starting Web UI..."
        volumeMounts:
        - name: configs-tmpl
          mountPath: /template/index.html
          subPath: index.html
        - name: web-root
          mountPath: /app/html
      containers:
      - name: nginx-ui
        image: nginx:alpine
        ports: [{ containerPort: 8080 }]
        volumeMounts:
        - name: configs-tmpl
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: web-root
          mountPath: /usr/share/nginx/html
      - name: xray-core
        image: teddysun/xray:latest
        command: ["/usr/bin/xray", "-config", "/etc/xray/config.json"]
        volumeMounts:
        - name: configs-tmpl
          mountPath: /etc/xray/config.json
          subPath: config-direct.json
      volumes:
      - name: configs-tmpl
        configMap: { name: master-configs }
      - name: web-root
        emptyDir: {}

---
# 6️⃣ VLESS Argo 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-argo
  namespace: my-proxy
spec:
  replicas: 1
  selector: { matchLabels: { app: proxy-argo } }
  template:
    metadata:
      labels: { app: proxy-argo }
      annotations: { sidecar.istio.io/inject: "false" }
    spec:
      containers:
      - name: xray-core
        image: teddysun/xray:latest
        command: ["/usr/bin/xray", "-config", "/etc/xray/config.json"]
        volumeMounts:
        - name: configs
          mountPath: /etc/xray/config.json
          subPath: config-tunnel.json
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        command: ["cloudflared", "tunnel", "--no-autoupdate", "run", "--token", "YOUR_ARGO_TOKEN"]
      volumes:
      - name: configs
        configMap: { name: master-configs }

---
# 7️⃣ Hysteria2 部署 (🌟 已回滚为原生镜像与配置)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-hy2
  namespace: my-proxy
spec:
  replicas: 1
  selector: { matchLabels: { app: proxy-hy2 } }
  template:
    metadata:
      labels: { app: proxy-hy2 }
      annotations: { sidecar.istio.io/inject: "false" }
    spec:
      containers:
      - name: hy2-container
        image: tobyxdd/hysteria:latest
        ports: [{ containerPort: 10086, protocol: UDP }]
        command: ["/usr/local/bin/hysteria", "server", "-c", "/etc/hysteria/config.json"]
        volumeMounts:
        - name: secret-volume
          mountPath: /etc/hysteria
          readOnly: true
      volumes:
      - name: secret-volume
        secret: { secretName: hy2-files }

---
# 8️⃣ TUIC v5 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-tuic
  namespace: my-proxy
spec:
  replicas: 1
  selector: { matchLabels: { app: proxy-tuic } }
  template:
    metadata:
      labels: { app: proxy-tuic }
      annotations: { sidecar.istio.io/inject: "false" }
    spec:
      containers:
      - name: tuic-server
        image: ghcr.io/sagernet/sing-box:v1.13.3
        ports: [{ containerPort: 8443, protocol: UDP }]
        command: ["sing-box", "run", "-c", "/etc/tuic/config.json"]
        volumeMounts:
        - name: configs
          mountPath: /etc/tuic/config.json
          subPath: config-tuic.json
        - name: secret-volume
          mountPath: /etc/tuic/cert.pem
          subPath: cert.pem
          readOnly: true
        - name: secret-volume
          mountPath: /etc/tuic/key.pem
          subPath: key.pem
          readOnly: true
      volumes:
      - name: configs
        configMap: { name: master-configs }
      - name: secret-volume
        secret: { secretName: hy2-files }

---
# 9️⃣ Socks5 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-socks5
  namespace: my-proxy
spec:
  replicas: 1
  selector: { matchLabels: { app: proxy-socks5 } }
  template:
    metadata:
      labels: { app: proxy-socks5 }
      annotations: { sidecar.istio.io/inject: "false" }
    spec:
      containers:
      - name: proxy-container
        image: ghcr.io/sagernet/sing-box:v1.13.3
        command: ["sing-box", "run", "-c", "/etc/xray/config.json"]
        ports: [{ containerPort: 10800, protocol: TCP }]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/xray/config.json
          subPath: config-socks5.json
      volumes:
      - name: config-volume
        configMap: { name: master-configs }

---
# 🔟 网络暴露与路由 (Services & APIRule)
apiVersion: v1
kind: Service
metadata:
  name: web-direct-svc
  namespace: my-proxy
spec:
  selector: { app: proxy-web-direct }
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: gateway.kyma-project.io/v2alpha1
kind: APIRule
metadata:
  name: master-apirule
  namespace: my-proxy
spec:
  gateway: kyma-system/kyma-gateway
  hosts: 
    - YOUR_KYMA_DOMAIN
  service:
    name: web-direct-svc
    port: 80
  rules:
    - path: /
      methods: ["GET", "POST", "PUT", "HEAD", "OPTIONS", "CONNECT", "PATCH", "TRACE", "DELETE"]
      noAuth: true
    - path: /{**}
      methods: ["GET", "POST", "PUT", "HEAD", "OPTIONS", "CONNECT", "PATCH", "TRACE", "DELETE"]
      noAuth: true
---
apiVersion: v1
kind: Service
metadata:
  name: hy2-service
  namespace: my-proxy
  annotations: { service.beta.kubernetes.io/aws-load-balancer-type: "nlb" }
spec:
  type: LoadBalancer
  selector: { app: proxy-hy2 }
  ports:
  - name: hy2-udp-443
    protocol: UDP
    port: 443
    targetPort: 10086
---
apiVersion: v1
kind: Service
metadata:
  name: tuic-service
  namespace: my-proxy
  annotations: { service.beta.kubernetes.io/aws-load-balancer-type: "nlb" }
spec:
  type: LoadBalancer
  selector: { app: proxy-tuic }
  ports:
  - name: tuic-udp-8443
    protocol: UDP
    port: 8443
    targetPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: socks5-service
  namespace: my-proxy
  annotations: { service.beta.kubernetes.io/aws-load-balancer-type: "nlb" }
spec:
  type: LoadBalancer
  selector: { app: proxy-socks5 }
  ports:
  - name: socks5-tcp
    protocol: TCP
    port: 1080
    targetPort: 10800
