# ==============================================================================
# Kyma Ultimate Proxy Master YAML (Auto-NLB + Pro UI + Telegram Edition)
# 包含: VLESS(直连)+WebUI, VLESS(Argo), Hysteria2(UDP),Tuic v5(UDP),Socks5(TCP) 5合1节点
# ==============================================================================
# 在部署之前，请用编辑器全局搜索并替换以下 7 个大写占位符：
# YOUR_KYMA_DOMAIN：  你的 Kyma 真实分配的域名。
# YOUR_ARGO_DOMAIN：  你的 Argo 隧道域名。
# YOUR_ARGO_TOKEN：   你的 Argo 隧道TOKEN。
# YOUR_SUB_TOKEN：    你的 订阅私密路径TOKEN。
# YOUR_TG_BOT_TOKEN： 你的 Telegram Bot Token (例如 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11)。
# YOUR_TG_CHAT_ID：   你的 Telegram 接收账号或群组 ID (例如 123456789)。
# YOUR_UUID：         你的 UUID 

# 1️⃣ 命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: my-proxy
  labels:
    istio-injection: enabled

---
# 2️⃣ RBAC 权限控制 (允许 Pod 读取 Service 信息)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: proxy-sa
  namespace: my-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: proxy-role
  namespace: my-proxy
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: proxy-rolebinding
  namespace: my-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: proxy-role
subjects:
- kind: ServiceAccount
  name: proxy-sa
  namespace: my-proxy

---
# 3️⃣ 配置文件 (包含 5 大节点配置与前台 UI)
apiVersion: v1
kind: ConfigMap
metadata:
  name: master-configs
  namespace: my-proxy
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      server {
        listen 8080;
        
        location = / { return 404; }

        location /YOUR_SUB_TOKEN/ {
          alias /usr/share/nginx/html/;
          index index.html;
        }

        location /direct {
          proxy_redirect off;
          proxy_pass http://127.0.0.1:10000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }

  config-direct.json: |
    {
      "log": { "loglevel": "warning" },
      "inbounds": [{
        "port": 10000,
        "listen": "127.0.0.1",
        "protocol": "vless",
        "settings": {
          "clients": [{"id": "YOUR_UUID", "level": 0, "email": "direct@kyma"}],
          "decryption": "none"
        },
        "streamSettings": { "network": "ws", "wsSettings": { "path": "/direct" } }
      }],
      "outbounds": [{ "protocol": "freedom" }]
    }

  config-tunnel.json: |
    {
      "log": { "loglevel": "warning" },
      "inbounds": [{
        "port": 8001, 
        "listen": "127.0.0.1", 
        "protocol": "vless",
        "settings": {
          "clients": [{"id": "YOUR_UUID", "level": 0, "email": "tunnel@kyma"}],
          "decryption": "none"
        },
        "streamSettings": { "network": "ws", "wsSettings": { "path": "/tunnel" } }
      }],
      "outbounds": [{ "protocol": "freedom" }]
    }

  config-tuic.json: |
    {
      "log": {
        "level": "warn"
      },
      "inbounds": [
        {
          "type": "tuic",
          "tag": "tuic-in",
          "listen": "::",
          "listen_port": 8443,
          "users": [
            {
              "uuid": "YOUR_UUID",
              "password": "tuic666"
            }
          ],
          "congestion_control": "bbr",
          "tls": {
            "enabled": true,
            "certificate_path": "/etc/tuic/cert.pem",
            "key_path": "/etc/tuic/key.pem",
            "alpn": ["h3", "spdy/3.1"]
          }
        }
      ],
      "outbounds": [
        {
          "type": "direct",
          "tag": "direct"
        }
      ]
    }

  config-socks5.json: |
    {
      "log": {
        "level": "warn"
      },
      "inbounds": [
        {
          "type": "socks",
          "tag": "socks-in",
          "listen": "::",
          "listen_port": 10800,
          "users": [
            {
              "username": "tBqcmzxm",
              "password": "Rjqm0i4kv49jIWAa"
            }
          ]
        }
      ],
      "outbounds": [
        {
          "type": "direct",
          "tag": "direct"
        }
      ]
    }

  index.html: |
    <!doctype html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>Sap Kyma Proxy</title>
      <style>
        :root{ --bg: #0b1220; --panel: rgba(15, 23, 42, 0.88); --line: rgba(148, 163, 184, 0.18); --text: #e5eefc; --muted: #94a3b8; --accent: #3b82f6; --success: #22c55e; }
        * { box-sizing: border-box; }
        body{ margin:0; font-family: system-ui, sans-serif; color: var(--text); background: #0b1220; min-height: 100vh; }
        .wrap{ max-width: 1180px; margin: 0 auto; padding: 28px 20px; }
        .hero{ border: 1px solid var(--line); background: var(--panel); border-radius: 24px; overflow: hidden; }
        .hero-top{ padding: 18px 20px; border-bottom: 1px solid var(--line); font-weight: bold; }
        
        .hero-main{ padding: 24px; display: flex; flex-direction: column; gap: 24px; }
        
        .tabs-card { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: rgba(30,41,59,.42); display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .tab-btn{ 
          background: rgba(15,23,42,.75); color: var(--text); border: 1px solid var(--line); 
          padding: 12px 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; 
          font-weight: bold; font-size: 14px;
          flex: 1 1 0%; min-width: 150px; text-align: center;
        }
        .tab-btn.active, .tab-btn:hover{ background: var(--accent); border-color: var(--accent); }
        
        .content-body { display: grid; grid-template-columns: 320px 1fr; gap: 24px; transition: 0.3s; }
        .content-body.no-qr { grid-template-columns: 1fr; }
        
        .qr-card, .info-card{ border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: rgba(30,41,59,.42); display: flex; flex-direction: column; }
        .qr-box{ width: 100%; aspect-ratio: 1; background: #fff; border-radius: 24px; padding: 14px; display:grid; place-items:center; margin-bottom: 15px;}
        .qr-box img{ width: 100%; height: 100%; border-radius: 14px; }
        
        .link-box{ font-family: monospace; font-size: 13px; line-height: 1.5; word-break: break-all; color: #dbeafe; background: rgba(2,6,23,.5); padding: 15px; border-radius: 10px; border: 1px solid var(--line); min-height: 120px; flex-grow: 1; margin-bottom: 15px; white-space: pre-wrap;}
        
        .action-group { display: flex; gap: 16px; margin-top: 5px; }
        .copy-btn, .tg-btn { 
          flex: 1; border: none; border-radius: 14px; padding: 14px; 
          cursor: pointer; font-size: 15px; font-weight: bold; color: white; transition: 0.2s; 
          text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;
          background: var(--accent); 
        }
        .copy-btn:hover, .tg-btn:hover { background: #2563eb; }

        /* === 完美居中弹窗样式 === */
        .custom-modal {
          position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 9999;
          display: flex; align-items: center; justify-content: center;
          opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
          backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .custom-modal.active { opacity: 1; pointer-events: auto; }
        .custom-modal-content {
          background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
          padding: 30px 24px; width: 85%; max-width: 350px; text-align: center;
          transform: scale(0.9); transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }
        .custom-modal.active .custom-modal-content { transform: scale(1); }
        .custom-modal-text { margin-bottom: 26px; font-size: 16px; line-height: 1.6; color: var(--text); white-space: pre-wrap;}
        .custom-modal-btn {
          background: var(--accent); color: white; border: none; padding: 12px 24px;
          border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; 
          transition: 0.2s; width: 100%;
        }
        .custom-modal-btn:hover { background: #2563eb; transform: translateY(-1px); }
        
        @media (max-width: 980px){ .content-body{ grid-template-columns: 1fr; } .action-group { flex-direction: column; } }
      </style>
    </head>
    <body>
      <div class="wrap">
        <h2>🚀 Sap Kyma Proxy</h2>
        <section class="hero">
          <div class="hero-top">🌍 节点订阅台 (All in One)</div>
          <div class="hero-main">
            
            <div class="tabs-card">
              <button class="tab-btn" onclick="switchNode('all', event)">🌍 所有节点</button>
              <button class="tab-btn" onclick="switchNode('direct', event)">⚡ VLESS 直连 (Web)</button>
              <button class="tab-btn" onclick="switchNode('argo', event)">🛡️ VLESS Argo (隧道)</button>
              <button class="tab-btn" onclick="switchNode('hy2', event)">🚀 Hysteria2 (UDP)</button>
              <button class="tab-btn" onclick="switchNode('tuic', event)">🏎️ TUIC v5 (UDP)</button>
              <button class="tab-btn" onclick="switchNode('socks5', event)">🧦 Socks5 (TCP)</button>
            </div>

            <div class="content-body" id="contentBody">
              <div class="qr-card" id="qrCard">
                <div style="color:var(--muted); margin-bottom:10px; text-align:center; font-weight:bold;">扫码添加节点</div>
                <div class="qr-box"><img id="qr" alt="QR Code" /></div>
              </div>
              
              <div class="info-card">
                <div style="color:var(--muted); margin-bottom:10px; font-weight:bold;">节点 URI 配置 (已加密为 Base64)</div>
                <div id="linkBox" class="link-box">请稍候...</div>
                
                <div class="action-group">
                  <button id="copyBtn" class="copy-btn">🔗 复制分享链接</button>
                  <button id="tgBtn" class="tg-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M21.5 2L2 10.5L9 14M21.5 2L15 22L9 14M21.5 2L9 14M9 14V20.5L13 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>推送至 Telegram</span>
                  </button>
                </div>

              </div>
            </div>

          </div>
        </section>
      </div>
      <script>
        // === 居中弹窗逻辑 ===
        function showModal(text) {
          let modal = document.getElementById('customModal');
          if (!modal) {
            modal = document.createElement('div');
            modal.id = 'customModal';
            modal.className = 'custom-modal';
            modal.innerHTML = `
              <div class="custom-modal-content">
                <div class="custom-modal-text" id="customModalText"></div>
                <button class="custom-modal-btn" onclick="closeModal()">我知道了</button>
              </div>
            `;
            document.body.appendChild(modal);
          }
          document.getElementById('customModalText').innerHTML = text;
          // 触发重绘以播放动画
          void modal.offsetWidth;
          modal.classList.add('active');
        }
        
        function closeModal() {
          const modal = document.getElementById('customModal');
          if(modal) modal.classList.remove('active');
        }

        const nodes = {
          direct: "vless://YOUR_UUID@YOUR_KYMA_DOMAIN:443?encryption=none&security=tls&sni=YOUR_KYMA_DOMAIN&type=ws&path=%2Fdirect#SAP-KYMA-VLESS",
          argo: "vless://YOUR_UUID@sin.cfip.oxxxx.de:443?encryption=none&security=tls&sni=YOUR_ARGO_DOMAIN&type=ws&path=%2Ftunnel#SAP-KYMA-ARGO",
          hy2: "hysteria2://4MKyhj1JzE@__HY2_TARGET__:443?sni=fake.example.com&obfs=salamander&obfs-password=msOy13(xcTJr69xn&insecure=1#SAP-KYMA-HY2",
          tuic: "tuic://YOUR_UUID:tuic666@__TUIC_TARGET__:8443?congestion_control=bbr&udp_relay_mode=native&alpn=h3&sni=fake.example.com&allow_insecure=1#SAP-KYMA-TUIC",
          socks5: "socks://dEJxY216eG06UmpxbTBpNGt2NDlqSVdBYQ@__SOCKS5_TARGET__:1080#SAP-KYMA-SOCKS5"
        };
        nodes.all = [nodes.direct, nodes.argo, nodes.hy2, nodes.tuic, nodes.socks5].join("\n");
        
        let rawLink = "";     
        let base64Link = "";  

        function switchNode(type, e) {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          if (e && e.target) {
            e.target.classList.add('active');
          } else {
            const btn = document.querySelector(`button[onclick="switchNode('${type}', event)"]`);
            if(btn) btn.classList.add('active');
          }
          
          rawLink = nodes[type];
          base64Link = btoa(unescape(encodeURIComponent(rawLink)));
          
          document.getElementById('linkBox').textContent = base64Link;
          
          const qrCard = document.getElementById('qrCard');
          const contentBody = document.getElementById('contentBody');
          const qr = document.getElementById('qr');
          const tgBtn = document.getElementById('tgBtn');
          
          if (type === 'all') {
             qrCard.style.display = 'none';
             contentBody.classList.add('no-qr');
             tgBtn.style.display = 'flex';
          } else {
             qrCard.style.display = 'flex';
             contentBody.classList.remove('no-qr');
             tgBtn.style.display = 'none';
             qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data=' + encodeURIComponent(rawLink);
          }
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(rawLink).then(() => {
            showModal(rawLink.includes('\n') ? '✅ 已复制所有明文节点！' : '✅ 已复制节点明文链接！');
          });
        });

        document.getElementById('tgBtn').addEventListener('click', () => {
          const btnText = document.querySelector('#tgBtn span');
          const originalText = btnText.innerText;
          btnText.innerText = "⏳ 推送中...";
          document.getElementById('tgBtn').disabled = true;

          const tgToken = "YOUR_TG_BOT_TOKEN";
          const tgChat = "YOUR_TG_CHAT_ID";
          
          let msg = "🚀 <b>Sap Kyma All in One (手动推送)！</b>\n\n";
          msg += "⚡ <b>VLESS 直连:</b>\n<code>" + nodes.direct + "</code>\n\n";
          msg += "🛡️ <b>VLESS Argo:</b>\n<code>" + nodes.argo + "</code>\n\n";
          msg += "🚀 <b>Hysteria2:</b>\n<code>" + nodes.hy2 + "</code>\n\n";
          msg += "🏎️ <b>TUIC v5:</b>\n<code>" + nodes.tuic + "</code>\n\n";
          msg += "🧦 <b>Socks5:</b>\n<code>" + nodes.socks5 + "</code>";

          fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: tgChat,
              parse_mode: 'HTML',
              text: msg
            })
          })
          .then(res => res.json())
          .then(data => {
            if(data.ok) showModal('✅ 已成功推送到你的 Telegram Bot！');
            else showModal('❌ 推送失败：\n' + data.description);
          })
          .catch(err => {
            showModal('❌ 推送异常，请检查网络！');
          })
          .finally(() => {
            btnText.innerText = originalText;
            document.getElementById('tgBtn').disabled = false;
          });
        });

        window.onload = () => switchNode('all', null);
      </script>
    </body>
    </html>

---
